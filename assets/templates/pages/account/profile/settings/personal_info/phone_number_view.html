        </div>

            <x-insert name="content">
                <div class="px-2 pb-2 flex flex-1">

                        <form class="flex flex-col flex-1 justify-between" id="phone-number-form" hx-post="/update-phone-number" hx-swap="none" hx-select-oob="#phone-number-validation-error" hx-target-error="#phone-number-form">
